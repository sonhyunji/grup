<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>result</title>
    <style>
        .layout {
            width: 500px;
            margin: 0 auto;
            margin-top: 40px;
        }

        h2 {
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="layout">
    <form action="/grup/result" method="get">
        answerId: <span th:text="${userAnswerPlants.answerId}"></span><br>
        temperature: <span th:text="${userAnswerPlants.answerTemperature}"></span> <br>
        Light: <span th:text="${userAnswerPlants.answerLight}"></span> <br>
        water: <span th:text="${userAnswerPlants.answerWater}"></span> <br>
        level: <span th:text="${userAnswerPlants.answerLevel}"></span> <br>
        <br>
        <div th:if="${result0}">
            <h2>Result 1</h2>
            <p th:text="${result0.plantsId}"></p>
        </div>
        <div th:if="${result1}">
            <h2>Result 2</h2>
            <p th:text="${result1.plantsId}"></p>
        </div>
        <div th:if="${result2}">
            <h2>Result 3</h2>
            <p th:text="${result2.plantsId}"></p>
        </div>
        <br>
        <a href="/grup/question">질문지로</a>
    </form>
</div>
</body>
</html>
